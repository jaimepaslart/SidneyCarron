title_fr: "Dans son nouveau clip, Christophe vogue sur un « Océan d'amour »"
title_en: "In his new video, Christophe sails on an 'Ocean of Love'"
publication: Chante France
date: "2016-04-27"
excerpt_fr: "Pour l'album « Les vestiges du chaos », Christophe confie la réalisation du clip « Océan d'amour » à Sidney Carron. « Les corps des figurants jeunes et vieux s'agitent devant l'objectif de Sidney Carron, la réalisatrice. Un clip insolite pour une mélodie mélancolique. »"
excerpt_en: "For the album 'Les vestiges du chaos,' Christophe entrusts the direction of the 'Océan d'amour' video to Sidney Carron. 'The bodies of young and old extras move before Sidney Carron's lens, the director. An unusual video for a melancholic melody.'"
url: "https://www.chantefrance.com/dans-son-nouveau-clip-christophe-vogue-sur-un-ocean-d-amour"
