title_fr: "La trace des âmes sur terre"
title_en: "The trace of souls on earth"
publication: Mediabask
date: "2026-01-29"
excerpt_fr: "À la Galerie Sakana de Donostia/San Sebastián, Sidney Carron présente « Izate Organikoa » (Existence Organique). Par la technique du cyanotype, elle crée des représentations sculpturales qui révèlent l'empreinte des corps sur le papier photosensible."
excerpt_en: "At the Galerie Sakana in Donostia/San Sebastián, Sidney Carron presents 'Izate Organikoa' (Organic Existence). Through the cyanotype technique, she creates sculptural representations that reveal the imprint of bodies on photosensitive paper."
