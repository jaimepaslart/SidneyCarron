title_fr: "JoeyStarr, le premier homme à faire la une de « Playboy »"
title_en: "JoeyStarr, the first man to make the cover of Playboy"
publication: Madame Figaro
date: "2018-03-15"
excerpt_fr: "Pour l'édition printemps 2018, le Playboy français ose l'inédit : confier sa couverture à un homme. JoeyStarr, photographié par Sidney Carron, pose en veste de tailleur et oreilles de lapin, entouré de femmes. Une première historique."
excerpt_en: "For the spring 2018 edition, French Playboy dares to break new ground: giving its cover to a man. JoeyStarr, photographed by Sidney Carron, poses in a suit jacket and bunny ears, surrounded by women. A historic first."
