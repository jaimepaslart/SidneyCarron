title_fr: "Sidney Carron, l'alchimie du grand bleu"
title_en: "Sidney Carron, the alchemy of the deep blue"
publication: Mediapart
date: "2024-10-13"
excerpt_fr: "Dans « Big Bang Blue », Sidney Carron déploie une approche innovante mêlant photographie, peinture et vidéo. Ses formes abstraites sur fond bleu océanique évoquent l'émerveillement et la découverte, dans une alchimie entre le corps, le soleil et la mer."
excerpt_en: "In 'Big Bang Blue,' Sidney Carron deploys an innovative approach blending photography, painting and video. Her abstract forms on oceanic blue backgrounds evoke wonder and discovery, in an alchemy between body, sun and sea."
