title_fr: "JoeyStarr en couverture de « Playboy » : un choix « en réaction à ce qu'il se passe depuis l'affaire Weinstein »"
title_en: "JoeyStarr on the cover of Playboy: a choice 'in reaction to what has been happening since the Weinstein affair'"
publication: Le Monde
date: "2018-03-17"
excerpt_fr: "Photographié par Sidney Carron, JoeyStarr devient le premier homme à faire la couverture du Playboy français. L'artiste décrit le rappeur comme l'incarnation du « mâle alpha », cherchant à capturer sa « virilité animale » dans un numéro post-MeToo."
excerpt_en: "Photographed by Sidney Carron, JoeyStarr becomes the first man to grace the cover of French Playboy. The artist describes the rapper as the embodiment of the 'alpha male,' seeking to capture his 'animal virility' in a post-MeToo issue."
