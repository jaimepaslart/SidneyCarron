excerpt_fr: "Vernissage de l'exposition « À la lumière du Brésil » de Sidney Carron à Colette Universe, Place des Vosges. Pierre Richard, Matthieu Chedid (-M-), Oxmo Puccino et Patrick Bouchitey admirent ses toiles monochromes aux silhouettes blanches sur fond bleu — des œuvres « alchimiques » nées du soleil et de l'océan."
excerpt_en: "Opening of Sidney Carron's exhibition 'À la lumière du Brésil' at Colette Universe, Place des Vosges. Pierre Richard, Matthieu Chedid (-M-), Oxmo Puccino and Patrick Bouchitey admire her monochrome canvases with white silhouettes on blue backgrounds — 'alchemical' works born from sun and ocean."
