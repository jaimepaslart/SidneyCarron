title_fr: "Sidney Carron, « Passeurs de lumière » — Galerie Rachel Hardouin"
title_en: "Sidney Carron, 'Passeurs de lumière' — Galerie Rachel Hardouin"
publication: Singulars
date: "2024-12-03"
excerpt_fr: "Interview approfondie à l'occasion de l'exposition « Passeurs de lumière » à la Galerie Rachel Hardouin. Sidney Carron revient sur son travail en osmose avec la nature : la complicité du soleil, les rafales d'air iodé et la fluidité des océans. Elle capte l'âme d'êtres singuliers — lutteurs, danseurs, sirènes."
excerpt_en: "In-depth interview for the 'Passeurs de lumière' exhibition at Galerie Rachel Hardouin. Sidney Carron discusses her work in symbiosis with nature: the sun's complicity, gusts of iodized air and the fluidity of oceans. She captures the soul of singular beings — wrestlers, dancers, mermaids."
