title_fr: "Premier homme à faire la Une du Playboy français, JoeyStarr sort les oreilles de lapin"
title_en: "First man to make the cover of French Playboy, JoeyStarr dons the bunny ears"
publication: Huffington Post
date: "2018-03-16"
excerpt_fr: "JoeyStarr écrit l'histoire en devenant le premier homme en couverture du Playboy français. Photographié par Sidney Carron, le rappeur pose avec charisme dans un numéro qui bouscule les codes du magazine après l'affaire Weinstein."
excerpt_en: "JoeyStarr makes history as the first man on the cover of French Playboy. Photographed by Sidney Carron, the rapper poses with charisma in an issue that challenges the magazine's norms in the wake of the Weinstein affair."
