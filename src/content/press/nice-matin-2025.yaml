title_fr: "Des voyages artistiques imaginaires à ciel ouvert à Grimaud"
title_en: "Imaginary artistic journeys in the open air in Grimaud"
publication: Nice-Matin
date: "2025-08-18"
excerpt_fr: "À l'occasion de l'événement Art Sunset à Grimaud, Sidney Carron expose ses cyanotypes à la Galerie A. « Ses œuvres monochromes, réalisées selon la technique du cyanotype, révèlent une poésie bleutée, où les corps, la mer, le soleil et la lumière s'entrelacent. »"
excerpt_en: "For the Art Sunset event in Grimaud, Sidney Carron exhibits her cyanotypes at Galerie A. 'Her monochrome works, created using the cyanotype technique, reveal a bluish poetry, where bodies, sea, sun and light intertwine.'"
