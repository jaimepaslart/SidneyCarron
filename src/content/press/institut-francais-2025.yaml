title_fr: "Exposition de Sidney Carron à la Galerie Sakana"
title_en: "Sidney Carron exhibition at Galerie Sakana"
publication: Institut Français d'Espagne
date: "2025-12-20"
excerpt_fr: "L'Institut Français de Bilbao annonce l'exposition de Sidney Carron à la Galerie Sakana de Donostia/San Sebastián. Ses œuvres fusionnent photographie, peinture et performance dans une exploration unique du cyanotype et des empreintes solaires."
excerpt_en: "The Institut Français de Bilbao announces Sidney Carron's exhibition at Galerie Sakana in Donostia/San Sebastián. Her works fuse photography, painting and performance in a unique exploration of cyanotype and solar prints."
